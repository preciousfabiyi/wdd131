<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Fish Farmers Hub helps farmers grow fish faster, manage ponds, and share ideas.">
<meta name="author" content="Precious Fabiyi">

<title>Fish Farmers Hub</title>

<link rel="stylesheet" href="css/styles.css">
<script defer src="js/script.js"></script>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Roboto&display=swap" rel="stylesheet">

</head>

<body>

<header>
  <h1>🐟 Fish Farmers Hub</h1>

  <!-- Dropdown Navigation -->
  <nav class="dropdown">
    <button class="dropbtn">Menu ☰</button>
    <div class="dropdown-content">
      <a href="index.html">Home</a>
      <a href="trips.html">Farming Tips</a>
      <a href="contact.html">Contact</a>
      <a href="references.html">References</a>
    </div>
  </nav>
<button id="themeToggle">🌙 Dark Mode</button>
  <p>Visitors: <span id="visits">0</span></p>
</header>

<main>

<!-- HERO -->
<section class="hero">
  <h2>Grow Smarter. Farm Better.</h2>
  <p>Modern solutions for fish farmers</p>
</section>

<!-- IMAGE GALLERY -->
<section class="gallery">
  <img src="images/fish1.jpg" loading="lazy" width="300">
  <img src="images/fish2 .jpg" loading="lazy" width="300">
  <img src="images/fish3.jpg" loading="lazy" width="300">
</section>

<!-- FISH DATA -->
<section>
  <h2>Popular Fish Types</h2>
  <div id="fishList"></div>
</section>

<!-- REVIEW FORM -->
<section>
  <h2>Share Your Opinion</h2>

  <form id="reviewForm">
    <label for="username">Name</label>
    <input type="text" id="username">

    <label for="comment">Your Experience</label>
    <textarea id="comment"></textarea>

    <input type="submit" value="Submit Review">

    <label>Rate Experience:</label>
<div id="stars">
  <span data-value="1">⭐</span>
  <span data-value="2">⭐</span>
  <span data-value="3">⭐</span>
  <span data-value="4">⭐</span>
  <span data-value="5">⭐</span>
</div>
  </form>

  <div id="reviewList"></div>
</section>
<section>
  <h2>Fish Growth Calculator</h2>

  <input type="number" id="fishCount" placeholder="Number of fish">
  <input type="number" id="feedRate" placeholder="Feed per fish (g)">
  
  <button onclick="calculateGrowth()">Calculate</button>

  <p id="result"></p>
</section>

</main>

<footer>
  <p>&copy; 2026 Fish Farmers Hub | Designed by Precious Fabiyi</p>
  <p><a href="references.html">References</a></p>
</footer>

</body>
</html>
