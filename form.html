<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Product review form of fish products to help fish farmers to be more familiar with the products and to understand some use of the products they are using or are yet to buy.">
<meta name="author" content="Precious Fabiyi">
<title>Product Review Form</title>

<link rel="stylesheet" href="css/form.css">
<script src="js/form.js" defer></script>
</head>

<body>

<header>
  <h1>Product Review</h1>
</header>

<main>
<form method="get" action="review.html">

  <fieldset>
    <legend>Product Information</legend>
    <!-- Product Name -->
    <label for="product">Product Name</label>
    <select id="product" name="product" required>
      <option value="" disabled selected>Select a Product ...</option>
    </select>
  </fieldset>

<!-- Rating -->
<label>Overall Rating</label>
<div class="rating">
<fieldset>
  <legend>Overall Rating</legend>

  <input type="radio" id="rate1" name="rating" value="1" required>
  <label for="rate1">☆</label>

  <input type="radio" id="rate2" name="rating" value="2" required>
  <label for="rate2">☆☆</label>

  <input type="radio" id="rate3" name="rating" value="3" required>
  <label for="rate3">☆☆☆</label>

  <input type="radio" id="rate4" name="rating" value="4" required>
  <label for="rate4">☆☆☆☆</label>

  <input type="radio" id="rate5" name="rating" value="5" required>
  <label for="rate5">☆☆☆☆☆</label>

</fieldset>
</div>

<!-- Date -->
<label for="date">Date of Installation</label>
<input type="date" id="date" name="date" required>

<label>Useful Features</label>

<input type="checkbox" id="feat1" name="features" value="Durable">
<label for="feat1">Durable</label>

<input type="checkbox" id="feat2" name="features" value="Easy Use">
<label for="feat2">Easy Use</label>

<input type="checkbox" id="feat3" name="features" value="Affordable">
<label for="feat3">Affordable</label>

<input type="checkbox" id="feat4" name="features" value="Energy Efficient">
<label for="feat4">Energy Efficient</label>


<!-- Review -->
<label for="review">Written Review(optional)</label>
<textarea id="review" name="review"></textarea>

<!-- Username -->
<label for="username">Your Name</label>
<input type="text" id="username" name="username">

<!-- Submit -->
<input type="submit" value="Submit Review">

</form>
</main>

<footer>
  <p>&copy; 2026 | Product Reviews</p>
</footer>

</body>
</html>
